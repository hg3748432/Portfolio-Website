services:
  backend:
    build: ./backend
    container_name: portfolio-backend-compose
    ports:
      - "5000:5000"
    restart: always
    depends_on:
      - mongo
    environment:
      MONGO_URI: mongodb://mongo:27017/portfolio_db

  mongo:
    image: mongo:7
    container_name: portfolio-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
