name: Deploy Portfolio Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "📥 Pull latest code"
            cd ~/Portfolio-Website
            git pull origin main

            echo "🐳 Restart Docker containers"
            sudo docker-compose down
            sudo docker-compose up -d --build

            echo "🌐 Deploy frontend to nginx root"
            sudo rm -rf /var/www/html/*
            sudo cp -r ~/Portfolio-Website/index.html /var/www/html/
            sudo cp -r ~/Portfolio-Website/style.css /var/www/html/
            sudo cp -r ~/Portfolio-Website/main.js /var/www/html/

            echo "🔄 Reload nginx"
            sudo systemctl reload nginx

            echo "✅ Deployment complete"
